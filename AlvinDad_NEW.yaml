# 锚点配置
x-base-provider: &base-provider
  type: http
  interval: 86400
  health-check:
    enable: true
    url: 'https://www.google.com/generate_204'
    interval: 300
  exclude-filter: '(?i)家宽|冷门|重置|剩余|到期|官网|直连|网址|倍率|高倍|\d+(\.\d+)?(x|倍)'

x-url-test: &url-test
  type: url-test
  url: "https://www.gstatic.com/generate_204"
  interval: 300
  empty-fallback: REJECT
  include-all: true
  hidden: true
  tolerance: 50

x-load-balance: &load-balance
  type: load-balance
  url: "https://www.gstatic.com/generate_204"
  interval: 300
  empty-fallback: REJECT
  include-all: true
  hidden: true
  strategy: consistent-hashing

x-fallback: &fallback
  type: fallback
  url: "https://www.gstatic.com/generate_204"
  interval: 300
  empty-fallback: REJECT

x-filter-hk: &filter-hk "(?i)港|hk|hongkong|hong kong"
x-filter-tw: &filter-tw "(?i)台|tw|taiwan|taipei"
x-filter-jp: &filter-jp "(?i)日|jp|japan|tokyo"
x-filter-sg: &filter-sg "(?i)新|sg|singapore"
x-filter-kr: &filter-kr "(?i)韩|kr|korea|seoul"
x-filter-us: &filter-us "(?i)美|us|usa|america|united states"
x-filter-emby: &filter-emby "(?i)美|us|usa|america|united states|港|hk|hongkong|hong kong|台|tw|taiwan|taipei"
x-filter-ai: &filter-ai "(?i)美|us|usa|america|united states|台|tw|taiwan|taipei|日|jp|japan|tokyo|新|sg|singapore"

x-oversea: &oversea
  - 故障转移
  - 全球手动
  - 香港策略
  - 台湾策略
  - 日本策略
  - 狮城策略
  - 韩国策略
  - 美国策略
  - Emby策略
  - DIRECT

x-ai: &ai
  - 美国策略  
  - 狮城策略
  - 日本策略
  - 韩国策略
  - 台湾策略
  - 香港策略

x-direct: &direct
