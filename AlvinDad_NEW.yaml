# --- 基础配置 ---
port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: :9090

# --- DNS 优化 (防止 DNS 污染，提升 AI 与流媒体访问速度) ---
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver:
    - https://dns.alicdn.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  # 重点：国内域名强制走国内解析，不问国外 DNS
  nameserver-policy:
    "geosite:cn": [https://dns.alicdn.com/dns-query, https://doh.pub/dns-query]
    "geosite:apple": [https://doh.pub/dns-query]
    "geosite:microsoft": [https://doh.pub/dns-query]

# --- 代理集合 (请在此处填入你的订阅链接) ---
proxy-providers:
  A:
    type: http
    path: ./ProxySet/Alvin/AlvinDad_Provider_ACL4SSR_A.yaml
    url: "你的订阅链接" # <--- 填入之前代码中的 URL
    interval: 21600
    exclude-filter: '家宽|冷门|重置|剩余|到期'
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 150
  B:
    type: http
    path: ./ProxySet/Alvin/AlvinDad_Provider_ACL4SSR_B.yaml
    url: "你的订阅链接" # <--- 填入之前代码中的 URL
    interval: 21600
    exclude-filter: '家宽|冷门|重置|剩余|到期'
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 150
  C:
    type: http
    path: ./ProxySet/Alvin/AlvinDad_Provider_C.yaml
    url: "你的订阅链接" # <--- 填入之前代码中的 URL
    interval: 21600
    exclude-filter: '家宽|冷门|x|X|重置|剩余|到期|网址|Lite|lite'
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 150

# --- 策略组 ---
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - ♻️ 自动选择2
      - ✈️ 手动选择
      - 🔮 负载均衡
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 📺 Emby专用节点
      - DIRECT

  - name: 🔮 负载均衡
    type: load-balance
    url: http://www.gstatic.com/generate_204
    strategy: consistent-hashing
    include-all-providers: true

  - name: ♻️ 自动选择
    type: url-test
    tolerance: 50
    url: http://www.gstatic.com/generate_204
    exclude-filter: 'Emby|emby'
    interval: 300
    include-all-providers: true

  - name: ♻️ 自动选择2
    type: url-test
    use: [A]
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: ✈️ 手动选择
    type: select
    include-all-providers: true

  - name: 🎯 国内流量
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 💬 Ai
    type: select
    filter: '美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|日本|川日|东京|大阪|泉日|埼玉|🇭🇰|HK|新加坡|SG'
    include-all-providers: true

  - name: 📹 YouTube
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择

  - name: 🎥 Netflix
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - 🚀 节点选择

  - name: 🎬 EMBY
    type: select
    proxies:
      - 📺 Emby专用节点
      - ♻️ 自动选择
      - 🇭🇰 香港节点
      - ✈️ 手动选择

  - name: 🎵 Spotify
    type: select
    proxies:
      - 🚀 节点选择
      - 🇸🇬 狮城节点
      - 🎯 国内流量

  - name: 🎶 TikTok
    type: select
    proxies:
      - 🚀 节点选择
      - 🇭🇰 香港节点
      - 🇸🇬 狮城节点

  - name: 🌍 国外媒体
    type: select
    proxies:
      - 🚀 节点选择
      - 🎯 国内流量

  - name: 🌏 国内媒体
    type: select
    proxies:
      - 🎯 国内流量

  - name: 📲 Telegram
    type: select
    proxies:
      - 🚀 节点选择
      - 🇸🇬 狮城节点

  - name: 👨‍💻 GitHub
    type: select
    proxies:
      - 🚀 节点选择
      - 🎯 国内流量

  - name: 🍎 苹果服务
    type: select
    proxies:
      - DIRECT
      - 🎯 国内流量
      - 🚀 节点选择

  - name: Ⓜ️ 微软云盘
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: Ⓜ️ 微软服务
    type: select
    proxies:
      - DIRECT
      - 🎯 国内流量

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT
      - 🎯 国内流量

  # 区域自动优选
  - name: 🇭🇰 香港节点
    type: url-test
    filter: '港|HK|hk|Hong Kong|HongKong'
    include-all-providers: true
  - name: 🇨🇳 台湾节点
    type: url-test
    filter: '台|新北|彰化|TW|Taiwan'
    include-all-providers: true
  - name: 🇸🇬 狮城节点
    type: url-test
    filter: '新加坡|坡|狮城|SG|Singapore'
    include-all-providers: true
  - name: 🇯🇵 日本节点
    type: url-test
    filter: '日本|JP|Japan'
    include-all-providers: true
  - name: 🇺🇲 美国节点
    type: url-test
    filter: '美|US|United States'
    include-all-providers: true
  - name: 📺 Emby专用节点
    type: url-test
    exclude-filter: 'pro|Lite|lite'
    include-all-providers: true

