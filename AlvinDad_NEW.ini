[custom]
; ==================== 1. 过滤机场原始节点 ====================
ex_node_name_regex = (?i)家宽|冷门|重置|剩余|到期|官网|直连|网址|倍率|高倍|(^|[^.\d])(([2-9]\d*|1\d+)(\.\d+)?|1\.[1-9]\d*)(x|倍)

; ==================== 2. 策略组配置 ====================
; --- 自动测速/故障转移组 ---
custom_proxy_group = 全球自动`url-test`.*`https://github.com/Koolson/Qure/raw/master/IconSet/Color/Rainbow.png`https://www.gstatic.com/generate_204`300`50
custom_proxy_group = 香港自动`url-test`^(?i)(?=[^-]*(-|$)).*(港|hk|hongkong|hong kong|🇭🇰)`https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png`https://www.gstatic.com/generate_204`300`50
custom_proxy_group = 台湾自动`url-test`^(?i)(?=[^-]*(-|$)).*(台|tw|taiwan|taipei|🇹🇼)`https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png`https://www.gstatic.com/generate_204`300`50
custom_proxy_group = 日本自动`url-test`^(?i)(?=[^-]*(-|$)).*(日|jp|japan|tokyo|🇯🇵)`https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png`https://www.gstatic.com/generate_204`300`50
custom_proxy_group = 狮城自动`url-test`^(?i)(?=[^-]*(-|$)).*(新加坡|sg|singapore|🇸🇬|^新(?![线上最]))`https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png`https://www.gstatic.com/generate_204`300`50
custom_proxy_group = 美国自动`url-test`^(?i)(?=[^-]*(-|$)).*(美|us|usa|america|united states|🇺🇸)`https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png`https://www.gstatic.com/generate_204`300`50
custom_proxy_group = Emby自动`url-test`^(?i)(?=[^-]*(-|$)).*(美|us|usa|america|united states|日|jp|japan|tokyo)`https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png`https://www.gstatic.com/generate_204`300`50

custom_proxy_group = 全球手动`select`.*`https://github.com/Koolson/Qure/raw/master/IconSet/Color/Clubhouse.png`

; --- 区域手动选择组（绑定对应的自动测速组） ---
