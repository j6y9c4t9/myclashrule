custom_proxy_group = 故障转移`fallback`全球自动`https://github.com/Koolson/Qure/raw/master/IconSet/Color/ULB.png`https://www.gstatic.com/generate_204`300`香港策略`台湾策略`狮城策略`日本策略`美国策略

